# .github/workflows/ci.yml

name: 🚀 CI Pipeline

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: 🛠 Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22

    steps:
      # ─────────────────────────────────────────────
      # Checkout Repository
      # ─────────────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # Setup Node.js
      # ─────────────────────────────────────────────
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # ─────────────────────────────────────────────
      # Install Dependencies
      # ─────────────────────────────────────────────
      - name: 📦 Install Dependencies
        run: npm ci

      # ─────────────────────────────────────────────
      # Check Formatting (optional)
      # ─────────────────────────────────────────────
      # - name: 🎨 Check Formatting
      #   run: npm run format:check

      # ─────────────────────────────────────────────
      # ESLint
      # ─────────────────────────────────────────────
      - name: 🔍 Run ESLint
        run: npm run lint

      # ─────────────────────────────────────────────
      # Type Check (only if TypeScript exists)
      # ─────────────────────────────────────────────
      # - name: 🧠 Type Check
      #   run: npm run type-check

      # ─────────────────────────────────────────────
      # Production Build
      # ─────────────────────────────────────────────
      - name: 🏗 Build Project
        run: npm run build

      # ─────────────────────────────────────────────
      # Upload Build Artifact
      # ─────────────────────────────────────────────
      - name: 📤 Upload Dist
        uses: actions/upload-artifact@v4
        with:
          name: vite-dist-node-${{ matrix.node-version }}
          path: dist
          retention-days: 7
